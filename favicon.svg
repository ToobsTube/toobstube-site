<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="1" y="1" width="62" height="62" rx="14" fill="#0a0d10" stroke="#1c242b" stroke-width="1.5"/>

  <!-- double-T crossbar -->
  <rect x="10" y="12" width="44" height="6" rx="2" fill="#e4e9ec"/>
  <!-- left T stem -->
  <rect x="17" y="12" width="6" height="26" fill="#e4e9ec"/>
  <!-- right T stem -->
  <rect x="41" y="12" width="6" height="26" fill="#b026ff" filter="url(#glow)"/>

  <!-- lightning bolt through the middle -->
  <path d="M34 10 L24 34 L31 34 L27 54 L42 28 L34 28 Z"
        fill="#28ec13" filter="url(#glow)"/>
</svg>
